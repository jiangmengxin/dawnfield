<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#FAF5EA" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>晨野 Dawnfield</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FAF5EA;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      position: fixed;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }
    /* 安全区探针：Viewport 读取 computedStyle 获得 env(safe-area-inset-*) */
    #safe-probe {
      position: fixed;
      top: 0; left: 0;
      width: 0; height: 0;
      visibility: hidden;
      pointer-events: none;
      padding-top: env(safe-area-inset-top, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="safe-probe"></div>
  <script>
    window.__errs = [];
    window.addEventListener('error', function (e) {
      window.__errs.push(String(e.message) + ' @ ' + (e.filename || '') + ':' + (e.lineno || 0));
    });
    window.addEventListener('unhandledrejection', function (e) {
      window.__errs.push('rejection: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
